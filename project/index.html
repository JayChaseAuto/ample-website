<!-- Editor-only error overlay. Catches uncaught script errors (Babel parse
     failures, runtime throws) and renders them on top of the black <body>
     so we don't stare at a blank screen. Auto-hides on next clean load. -->
<script>
(function () {
  // Cap the overlay so a render-loop error firing at 60Hz can't grow the
  // textContent past the heap. Also coalesce consecutive identical messages
  // into a single line with a "(×N)" counter, since most fault loops repeat
  // the same stack — keeps the overlay readable instead of a wall of
  // duplicates.
  var MAX_LEN = 64 * 1024;
  var lastMsg = null, lastBlock = null, lastCount = 0;
  function show(msg, kind) {
    var box = document.getElementById('__ample_err');
    if (!box) {
      box = document.createElement('pre');
      box.id = '__ample_err';
      box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2147483647;'
        + 'margin:0;padding:14px 18px;background:#1a0a0a;color:#ff6b6b;'
        + 'font:11px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;'
        + 'white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow:auto;'
        + 'border-bottom:2px solid #ff6b6b;';
      (document.body || document.documentElement).appendChild(box);
    }
    var block = '[' + kind + '] ' + msg;
    if (block === lastBlock) {
      lastCount++;
      box.textContent = (box.textContent.replace(/\s*\(×\d+\)\n\n$/, '\n\n'))
        .replace(/\n\n$/, ' (×' + lastCount + ')\n\n');
      return;
    }
    lastBlock = block;
    lastCount = 1;
    box.textContent += block + '\n\n';
    // Hard cap — trim oldest content if we'd otherwise exceed MAX_LEN.
    if (box.textContent.length > MAX_LEN) {
      box.textContent = '… [older messages trimmed] …\n\n'
        + box.textContent.slice(-MAX_LEN);
    }
  }
  window.addEventListener('error', function (e) {
    show((e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?') + '  '
      + (e.message || '?') + (e.error && e.error.stack ? '\n' + e.error.stack : ''),
      'error');
  });
  window.addEventListener('unhandledrejection', function (e) {
    show((e.reason && (e.reason.stack || e.reason.message)) || String(e.reason), 'unhandled promise');
  });
})();
</script>

<script>
(function () {
  try {
    var params = new URLSearchParams(window.location.search);
    var flag = params.get('edit');
    if (flag === '1') localStorage.setItem('__ampleEditor', '1');
    if (flag === '0') localStorage.removeItem('__ampleEditor');
    var stored = localStorage.getItem('__ampleEditor') === '1';
    var host = window.location.hostname;
    var isLocal = !host || host === 'localhost' || host === '127.0.0.1';
    window.__ampleEditor = flag === '1' || stored || (isLocal && flag !== '0');
  } catch (e) { window.__ampleEditor = false; }
  if (window.__ampleEditor) document.documentElement.setAttribute('data-editor', '1');
})();
</script>

/* exportTweaksState — normalises the in-memory tweak state for source.
   1. Walks the object for stragglers (blob: URLs, data: URLs).
   2. Each one is uploaded to the dev server via writeImageToAssets so the
      bytes actually land in project/assets/ — no manual file moves.
   3. Returns the cleaned JSON ready to paste between EDITMODE markers
      AND the list of uploaded filenames for the success UI.

   In normal use no stragglers exist: useImageDrop already wrote the file
   on drop, so the state already holds an "assets/..." path. This function
   is a backstop for the rare case where a drop happened while the dev
   server was offline. */
async function exportTweaksState(t) {
  const clone = JSON.parse(JSON.stringify(t));
  const uploads = [];
  const failures = [];
  const slugify = (s) => String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-')
                                  .replace(/^-+|-+$/g, '');
  const needsUpload = (v) =>
    typeof v === 'string' && /^(data:(image|video)\/|blob:)/i.test(v);

  // Convert a data: or blob: URL into a Blob the writer expects.
  // For data: URLs we round-trip via fetch — that's the standard way to
  // decode base64 into a Blob in the browser.
  async function urlToBlob(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`fetch ${url.slice(0, 32)}… → HTTP ${r.status}`);
    return await r.blob();
  }

  async function lift(prefix, value) {
    if (!needsUpload(value)) return value;
    try {
      const blob = await urlToBlob(value);
      const path = await window.writeImageToAssets(blob, prefix);
      uploads.push(path);
      return path;
    } catch (e) {
      failures.push({ prefix, error: (e && e.message) || String(e) });
      // Leave the original value so the user still sees something —
      // but the failures array makes the save UI surface this.
      return value;
    }
  }

  // liftSlot: walks a bag entry that's either a bare string OR the new
  // { url, position, scale, fit } shape, uploads the URL if it's a data/
  // blob URL, and preserves the meta. Returns the (possibly updated)
  // entry. Keeps shape stable across save → reload.
  async function liftSlot(prefix, v) {
    if (v && typeof v === 'object') {
      if (needsUpload(v.url)) return { ...v, url: await lift(prefix, v.url) };
      return v;
    }
    return await lift(prefix, v);
  }

  // Every image-bearing field routes through liftSlot — works for bare
  // strings AND { url, position, scale, fit } objects. Using lift() here
  // would silently ship blob:/data: URLs to source if any of these fields
  // were ever upgraded to slot shape.
  clone.heroImage = await liftSlot('custom-hero', clone.heroImage);
  if (clone.categoryImages) {
    for (const k of Object.keys(clone.categoryImages)) {
      clone.categoryImages[k] = await liftSlot(`custom-cat-${slugify(k)}`, clone.categoryImages[k]);
    }
  }
  if (clone.productOverrides) {
    for (const slug of Object.keys(clone.productOverrides)) {
      const o = clone.productOverrides[slug];
      if (o && o.heroBgImage) {
        o.heroBgImage = await liftSlot(`custom-product-${slugify(slug)}-hero`, o.heroBgImage);
      }
      if (o && o.calloutImage) {
        o.calloutImage = await liftSlot(`custom-callout-${slugify(slug)}`, o.calloutImage);
      }
    }
  }
  if (clone.catalogCardImages) {
    for (const k of Object.keys(clone.catalogCardImages)) {
      clone.catalogCardImages[k] = await liftSlot(`custom-card-${slugify(k)}`, clone.catalogCardImages[k]);
    }
  }
  if (clone.storyImages) {
    for (const k of Object.keys(clone.storyImages)) {
      clone.storyImages[k] = await liftSlot(`custom-history-${slugify(k)}`, clone.storyImages[k]);
    }
  }
  clone.goldStandardMedia = await liftSlot('custom-gold-dyno', clone.goldStandardMedia);
  if (clone.goldFeatureImages) {
    for (const k of Object.keys(clone.goldFeatureImages)) {
      clone.goldFeatureImages[k] = await liftSlot(`custom-gold-${slugify(k)}`, clone.goldFeatureImages[k]);
    }
  }

  // Format JSON to match the existing TWEAK_DEFAULTS style: 2-space indent,
  // forward slashes escaped (matches what Claude Design writes back).
  const json = JSON.stringify(clone, null, 2).replace(/\//g, '\\/');

  return { json, uploads, failures };
}

/* saveTweaksToSource — bakes the current tweak state into index.html's
   TWEAK_DEFAULTS block via POST /__editor/save_index. The dev server reads
   index.html, swaps the /*EDITMODE-BEGIN*..*EDITMODE-END*\/ contents
   atomically, and writes back. Any straggler in-memory URLs get uploaded
   by exportTweaksState first, so a successful save guarantees every
   reference in source points at a real file on disk. */
async function saveTweaksToSource(t) {
  try {
    const exported = await exportTweaksState(t);
    if (exported.failures.length) {
      // We still attempt to save the JSON (with whichever URLs we couldn't
      // promote), but the caller surfaces the failures so the user knows.
    }
    const resp = await fetch('/__editor/save_index', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tweaksJson: exported.json }),
    });
    let body = null;
    try { body = await resp.json(); } catch {}
    if (!resp.ok) {
      const reason = (body && body.error) || `HTTP ${resp.status}`;
      return {
        ok: false,
        error: `Save failed: ${reason}. Is the dev server running? (\`py dev-server.py\`)`,
      };
    }
    return {
      ok: true,
      filename: 'index.html',
      uploads: exported.uploads,
      failures: exported.failures,
    };
  } catch (e) {
    return {
      ok: false,
      error: `Save failed: ${(e && e.message) || String(e)}. Is the dev server running? (\`py dev-server.py\`)`,
    };
  }
}

function useHashRoute() {
  const get = () => (window.location.hash || '#/').slice(1);
  const [path, setPath] = React.useState(get());
  React.useEffect(() => {
    const on = () => { setPath(get()); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', on);
    return () => window.removeEventListener('hashchange', on);
  }, []);
  return path;
}

function applyTweaksToDOM(t) {
  const root = document.documentElement;
  root.style.setProperty('--ample-red', t.accentColor);
  // derived hot/deep variants — slight lighten/darken via color-mix
  root.style.setProperty('--ample-red-hot', `color-mix(in srgb, ${t.accentColor} 85%, white)`);
  root.style.setProperty('--ample-red-deep', `color-mix(in srgb, ${t.accentColor} 78%, black)`);
  root.style.setProperty('--accent', t.accentColor);
  root.style.setProperty('--border-hot', t.accentColor);
  root.setAttribute('data-theme', t.theme);
  // Site-wide background image. Set the CSS variable .atm-bg consumes —
  // empty/unset → no image, anything else → wrap in url(). Single source of
  // truth so both first-paint (pre-React shim) and live edits stay in sync.
  if (t.siteBackgroundImage) {
    root.style.setProperty('--site-bg-image', `url("${t.siteBackgroundImage}")`);
  } else {
    root.style.removeProperty('--site-bg-image');
  }
}

/* SiteBgDropCard — small drop slot inside the Tweaks panel Style tab.
   Drag-and-drop any image and it persists into project/assets/ via the
   dev server (useImageDrop handles the upload), then the URL lands in
   tweaks.siteBackgroundImage. The .atm-bg layer reads --site-bg-image
   from there. Includes a thumbnail preview and a Clear button. */
function SiteBgDropCard() {
  const { tweaks, setTweak } = useTweakState();
  const url = tweaks.siteBackgroundImage || '';
  const dropRef = React.useRef(null);
  useImageDrop(dropRef, (path, opts) => {
    setTweak('siteBackgroundImage', path, opts);
  }, { namePrefix: 'site-bg' });
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <div
        ref={dropRef}
        className="drop-target"
        style={{
          position: 'relative', aspectRatio: '16 / 9',
          borderRadius: 8,
          border: '1px dashed rgba(0,0,0,0.25)',
          background: url
            ? `url("${url}") center / cover no-repeat, rgba(0,0,0,0.06)`
            : 'rgba(0,0,0,0.06)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: 'rgba(41,38,27,0.55)',
          fontSize: 10.5, lineHeight: 1.3, textAlign: 'center',
          padding: 8,
        }}>
        {!url && <span>Drop an image here<br />for the site background</span>}
        <div className="drop-hint" style={{ borderRadius: 8 }}>Drop image to set site background</div>
      </div>
      {url && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 10.5,
                       color: 'rgba(41,38,27,0.6)' }}>
          <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis',
                          whiteSpace: 'nowrap', fontFamily: 'ui-monospace,monospace' }}>
            {url}
          </span>
          <button type="button" className="twk-btn secondary"
                  style={{ height: 22, padding: '0 8px', fontSize: 10 }}
                  onClick={() => setTweak('siteBackgroundImage', '')}>
            Clear
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  const path = useHashRoute();
  const [t, setTweak, history] = useTweaks(TWEAK_DEFAULTS);

  // Preview mode: 'desktop' is normal full-page render, 'mobile' shows the
  // page inside a 390-wide iframe. Toggle only renders for editors at the
  // top window — inside the iframe we always render the normal page.
  const isInIframe = typeof window !== 'undefined' && window.self !== window.top;
  const showPreviewToggle = typeof window !== 'undefined' && window.__ampleEditor && !isInIframe;
  const [previewMode, setPreviewMode] = React.useState('desktop');

  // Which product the Catalog tab is currently editing. Local UI state —
  // doesn't belong in the saved tweak file. Defaults to the first product
  // so the controls are populated on first visit.
  const [catalogEditingSlug, setCatalogEditingSlug] = React.useState(
    () => (window.PRODUCT_ORDER && window.PRODUCT_ORDER[0]) || ''
  );

  // Helpers built on top of setTweak's functional-updater form so they read
  // the latest state at write time (no stale closures).
  // All three helpers accept an optional `opts` (e.g., { skipHistory: true })
  // that forwards to setTweak. Used by useImageDrop's post-upload path swap
  // to keep the undo stack clean — the optimistic preview already pushed a
  // history entry, the canonical-path follow-up must not push another.
  const setProductTweak = React.useCallback((slug, key, value, opts) => {
    setTweak((prev) => ({
      productOverrides: {
        ...(prev.productOverrides || {}),
        [slug]: { ...((prev.productOverrides || {})[slug] || {}), [key]: value },
      },
    }), undefined, opts);
  }, [setTweak]);
  const mergeImageBag = React.useCallback((bagKey, key, value, opts) => {
    setTweak((prev) => ({
      [bagKey]: { ...(prev[bagKey] || {}), [key]: value },
    }), undefined, opts);
  }, [setTweak]);
  // Like mergeImageBag, but the value is a PATCH on the slot's object form
  // — so setting position doesn't clobber url, and setting a new url
  // preserves position/scale/fit. Strings in the bag are upgraded to
  // objects on first patch.
  const mergeImageSlot = React.useCallback((bagKey, key, patch, opts) => {
    setTweak((prev) => {
      const bag = prev[bagKey] || {};
      const cur = bag[key];
      const existing = (cur && typeof cur === 'object')
        ? cur
        : { url: typeof cur === 'string' ? cur : '' };
      return { [bagKey]: { ...bag, [key]: { ...existing, ...patch } } };
    }, undefined, opts);
  }, [setTweak]);

  // Context value — single source of truth. TweaksProvider also mirrors
  // the setters onto window.__ample* for any external embeds. History
  // (undo/redo/canUndo/canRedo) flows through so the panel can show
  // disabled-state buttons and so any consumer can trigger undo
  // programmatically.
  const tweaksContextValue = React.useMemo(
    () => ({ tweaks: t, setTweak, setProductTweak, mergeImageBag, mergeImageSlot, history }),
    [t, setTweak, setProductTweak, mergeImageBag, mergeImageSlot, history]
  );

  // Global undo/redo keyboard shortcuts — editor only, suppressed while
  // typing in inputs/textareas so they don't fight the browser's own
  // text-editing Ctrl+Z. Works whether the panel is open or closed.
  React.useEffect(() => {
    if (!window.__ampleEditor) return;
    const onKey = (e) => {
      if (!(e.ctrlKey || e.metaKey)) return;
      const el = e.target;
      const tag = el && el.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' ||
          (el && el.isContentEditable)) return;
      const isZ = e.key === 'z' || e.key === 'Z';
      const isY = e.key === 'y' || e.key === 'Y';
      if (isZ && !e.shiftKey) { e.preventDefault(); history.undo(); }
      else if ((isZ && e.shiftKey) || isY) { e.preventDefault(); history.redo(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [history]);

  // CSS variables / data-theme — still needs to run on every t change.
  React.useEffect(() => { applyTweaksToDOM(t); }, [t]);
  if (typeof window !== 'undefined' && !window.__ampleTweaks) {
    // Pre-mount best-effort so CSS variables apply on first paint before
    // TweaksProvider's useEffect runs.
    window.__ampleTweaks = t;
    applyTweaksToDOM(t);
  }

  let page;
  let productSlug = null;
  if (path === '/' || path === '') page = <HomePage />;
  else if (path === '/catalog') page = <CatalogPage />;
  else if (path.startsWith('/catalog/')) {
    const cat = decodeURIComponent(path.slice('/catalog/'.length));
    page = <CatalogPage filter={cat} />;
  }
  else if (path === '/gold') page = <GoldStandardPage />;
  else if (path === '/story') page = <StoryPage />;
  else if (path === '/contact') page = <ContactPage />;
  else {
    const m = path.match(/^\/product\/([a-z-]+)$/);
    if (m) { productSlug = m[1]; page = <ProductDetailPage slug={m[1]} />; }
    else page = <HomePage />;
  }

  // Per-product effective values (defaults from PRODUCTS, overrides on top).
  const productData = productSlug
    ? { ...(window.PRODUCTS && window.PRODUCTS[productSlug]),
        ...((t.productOverrides || {})[productSlug] || {}) }
    : null;

  // Photo dropdown options for category banners + product hero backgrounds.
  const photoOpts = AVAILABLE_PHOTOS;
  const heroAssetOpts = HERO_ASSET_OPTIONS;

  // Product hero photo options: static catalog photos + every hero image
  // currently set across products + the current selection if it's not
  // already in either bucket. As you drop new images on one product page,
  // they show up in every other product's dropdown.
  const productHeroPhotoOpts = React.useMemo(() => {
    const seen = new Set();
    const out = [{ value: '', label: '(none, gradient)' }];
    for (const p of AVAILABLE_PHOTOS) {
      if (p.value && !seen.has(p.value)) { seen.add(p.value); out.push(p); }
    }
    const all = t.productOverrides || {};
    for (const slug of Object.keys(all)) {
      const u = all[slug] && all[slug].heroBgImage;
      if (u && !seen.has(u)) {
        seen.add(u);
        const file = u.split('/').pop();
        const niceSlug = slug.replace(/-/g, ' ');
        out.push({ value: u, label: `${niceSlug} hero — ${file}` });
      }
    }
    const cur = productData?.heroBgImage;
    if (cur && !seen.has(cur)) {
      out.push({ value: cur, label: cur.split('/').pop() });
    }
    return out;
  }, [t.productOverrides, productData?.heroBgImage]);

  // Atmosphere layer visibility.
  const atm = t.atmosphere || 'both';
  const showGrid = atm === 'grid' || atm === 'both';
  const showNoise = atm === 'noise' || atm === 'both';
  const glowOpacity = (t.atmosphereGlow != null ? t.atmosphereGlow : 6) / 100;

  // Save flow — writes the current tweak state into index.html via the
  // dev server. Any straggler blob:/data: URLs get uploaded along the way.
  const [exportResult, setExportResult] = React.useState(null);
  const handleExport = async () => {
    setExportResult({ pending: true });
    setExportResult(await exportTweaksState(t));
  };
  const [saveResult, setSaveResult] = React.useState(null);
  const handleSave = async () => {
    setSaveResult({ pending: true });
    setSaveResult(await saveTweaksToSource(t));
  };

  // Dev server detection — controls whether drops can land on disk and
  // whether Save & lock is reachable at all. Probed on mount, re-probable
  // via the Recheck button. While probing → null; after probe → { ok, ... }.
  const [devStatus, setDevStatus] = React.useState(null);
  const checkDevServer = React.useCallback(async () => {
    setDevStatus(null);
    if (typeof window.resetDevServerProbe === 'function') {
      window.resetDevServerProbe();
    }
    const r = typeof window.detectDevServer === 'function'
      ? await window.detectDevServer()
      : { ok: false, reason: 'editor helpers not loaded' };
    setDevStatus(r);
  }, []);
  React.useEffect(() => { checkDevServer(); }, [checkDevServer]);

  // Live drop telemetry from useImageDrop. inFlight counts uploads still
  // running; lastOk / lastErr feed the toast strip in the corner.
  const [uploads, setUploads] = React.useState({ inFlight: 0, lastOk: null, lastErr: null });
  React.useEffect(() => {
    const onStart = () => setUploads((u) => ({ ...u, inFlight: u.inFlight + 1 }));
    const onOk = (e) => setUploads((u) => ({
      inFlight: Math.max(0, u.inFlight - 1),
      lastOk: { path: e?.detail?.path, at: Date.now() },
      lastErr: null,
    }));
    const onErr = (e) => setUploads((u) => ({
      inFlight: Math.max(0, u.inFlight - 1),
      lastOk: u.lastOk,
      lastErr: { reason: e?.detail?.reason || 'unknown', at: Date.now() },
    }));
    window.addEventListener('ample-upload-start', onStart);
    window.addEventListener('ample-upload-success', onOk);
    window.addEventListener('ample-upload-error', onErr);
    return () => {
      window.removeEventListener('ample-upload-start', onStart);
      window.removeEventListener('ample-upload-success', onOk);
      window.removeEventListener('ample-upload-error', onErr);
    };
  }, []);
  // Auto-clear the success toast after a brief window; errors stay until
  // the next upload or an explicit dismiss.
  React.useEffect(() => {
    if (!uploads.lastOk) return;
    const id = setTimeout(() => {
      setUploads((u) => (u.lastOk && u.lastOk.at === uploads.lastOk.at
        ? { ...u, lastOk: null } : u));
    }, 2400);
    return () => clearTimeout(id);
  }, [uploads.lastOk]);
  // Mirror activity state on window so the inline auto-reload poll (below
  // the React tree) can skip location.reload() while uploads or a save are
  // in flight. Without this guard, hitting Save & lock bumps the index.html
  // mtime mid-upload and the page reloads before writeImageToAssets
  // resolves — silently dropping the asset.
  React.useEffect(() => {
    window.__ampleUploadsInFlight = uploads.inFlight;
  }, [uploads.inFlight]);
  React.useEffect(() => {
    window.__ampleSavePending = !!(saveResult && saveResult.pending);
  }, [saveResult]);

  // Mobile preview mode: replace the page render with an iframe that
  // loads the same URL at 390px wide. The iframe child renders normally
  // (toggle is hidden inside iframes) so what you see in the frame is
  // exactly what a phone visitor would see.
  if (previewMode === 'mobile' && !isInIframe) {
    return (
      <TweaksProvider value={tweaksContextValue}>
        <PreviewToggle mode={previewMode} onChange={setPreviewMode} />
        <MobilePreviewFrame />
      </TweaksProvider>
    );
  }

  return (
    <TweaksProvider value={tweaksContextValue}>
      {showPreviewToggle && <PreviewToggle mode={previewMode} onChange={setPreviewMode} />}
      {/* Editor toast strip — sits above the Tweaks launcher (right edge,
          just above the ⚙ button). Shows live upload state so the user
          always knows what just happened, even with the panel closed.
          Stacked precedence: error > in-flight > success (auto-dismissed). */}
      {window.__ampleEditor && (uploads.inFlight > 0 || uploads.lastErr || uploads.lastOk) && (
        <div data-noncommentable="" role="status" style={{
          position: 'fixed', right: 16, bottom: 64, zIndex: 2147483645,
          display: 'flex', flexDirection: 'column', gap: 8,
          alignItems: 'flex-end', pointerEvents: 'none',
        }}>
          {uploads.lastErr && (
            <div style={{
              maxWidth: 320, padding: '10px 12px', pointerEvents: 'auto',
              background: 'rgba(161,58,42,0.95)', color: '#fff',
              border: '1px solid rgba(255,255,255,0.18)', borderRadius: 10,
              boxShadow: '0 12px 32px rgba(0,0,0,0.4)',
              fontFamily: 'ui-sans-serif,system-ui,-apple-system,sans-serif',
              fontSize: 11.5, lineHeight: 1.45,
              WebkitBackdropFilter: 'blur(10px)', backdropFilter: 'blur(10px)',
            }}>
              <div style={{ fontWeight: 700, marginBottom: 2 }}>Upload failed</div>
              <div style={{ opacity: 0.92 }}>{uploads.lastErr.reason}</div>
            </div>
          )}
          {uploads.inFlight > 0 && (
            <div style={{
              padding: '8px 12px',
              background: 'rgba(11,11,13,0.85)', color: 'rgba(255,255,255,0.95)',
              border: '1px solid rgba(255,255,255,0.14)', borderRadius: 999,
              boxShadow: '0 8px 24px rgba(0,0,0,0.4)',
              fontFamily: 'ui-sans-serif,system-ui,-apple-system,sans-serif',
              fontSize: 11, fontWeight: 600, letterSpacing: '0.04em',
              WebkitBackdropFilter: 'blur(10px)', backdropFilter: 'blur(10px)',
            }}>
              Uploading {uploads.inFlight} image{uploads.inFlight === 1 ? '' : 's'}…
            </div>
          )}
          {!uploads.lastErr && uploads.inFlight === 0 && uploads.lastOk && (
            <div style={{
              padding: '8px 12px',
              background: 'rgba(20,107,75,0.92)', color: '#fff',
              border: '1px solid rgba(255,255,255,0.18)', borderRadius: 999,
              boxShadow: '0 8px 24px rgba(0,0,0,0.35)',
              fontFamily: 'ui-sans-serif,system-ui,-apple-system,sans-serif',
              fontSize: 11, fontWeight: 600, letterSpacing: '0.02em',
              WebkitBackdropFilter: 'blur(10px)', backdropFilter: 'blur(10px)',
            }}>
              ✓ Saved <code style={{ fontFamily: 'ui-monospace,monospace', opacity: 0.85 }}>{uploads.lastOk.path}</code>
            </div>
          )}
        </div>
      )}
    <div className="atm-host">
      {/* Site-wide background texture. Driven by tweaks.siteBackgroundImage
          (via --site-bg-image CSS var, set in applyTweaksToDOM). Always
          rendered so it picks up the var if/when it appears — no DOM
          churn when the image swaps. */}
      <div className="atm-layer atm-bg" aria-hidden="true" />
      {showGrid && <div className="atm-layer atm-grid" aria-hidden="true" />}
      {showNoise && <div className="atm-layer atm-noise" aria-hidden="true" />}
      <div className="atm-layer atm-glow" aria-hidden="true"
           style={{ opacity: glowOpacity }} />
      {/* Animated atmosphere canvas. Tied to the same enable/disable as the
          static grid: if atmosphere is 'none', no canvas. Otherwise the
          canvas runs at 24fps capped, mobile-tuned, with a static frame
          when prefers-reduced-motion is on. */}
      {atm !== 'none' && <AtmosphereCanvas />}
      {page}
      <TweaksPanel title={
        productSlug ? 'Product · Tweaks'
        : (path === '/catalog' || path.startsWith('/catalog/')) ? 'Catalog · Tweaks'
        : path === '/gold' ? 'Gold · Tweaks'
        : path === '/story' ? 'Story · Tweaks'
        : path === '/contact' ? 'Contact · Tweaks'
        : 'Tweaks'
      }>
        {/* Route key drives the tab content. Empty tabs are hidden so the
            user only sees what the current page can actually change. */}
        {(() => {
          const routeKey = productSlug ? 'product'
            : (path === '/catalog' || path.startsWith('/catalog/')) ? 'catalog'
            : path === '/gold' ? 'gold'
            : path === '/story' ? 'story'
            : path === '/contact' ? 'contact'
            : 'home';
          // Tabs that are universally relevant. Style and Save show on every
          // route; Layout/Images/Content only show when the active route has
          // something to put in them.
          const hasLayout = routeKey === 'home' || routeKey === 'catalog' || routeKey === 'product';
          const hasImages = routeKey === 'home' || routeKey === 'catalog' || routeKey === 'product' || routeKey === 'gold' || routeKey === 'story';
          const hasContent = routeKey === 'home' || routeKey === 'catalog' || routeKey === 'product' || routeKey === 'gold' || routeKey === 'contact';

              <TweakTextarea label="Body" rows={4} value={t.goldTestingBody}
                             onChange={(v) => setTweak('goldTestingBody', v)} />

              <TweakSection label="Gold · Precision card" slot="gold-precision" />
              <TweakText label="Title" value={t.goldPrecisionTitle}
                         onChange={(v) => setTweak('goldPrecisionTitle', v)} />
              <TweakTextarea label="Body" rows={4} value={t.goldPrecisionBody}
                             onChange={(v) => setTweak('goldPrecisionBody', v)} />

              <TweakSection label="Gold · Material card" slot="gold-material" />
              <TweakText label="Title" value={t.goldMaterialTitle}
                         onChange={(v) => setTweak('goldMaterialTitle', v)} />
              <TweakTextarea label="Body" rows={4} value={t.goldMaterialBody}
                             onChange={(v) => setTweak('goldMaterialBody', v)} />

              <TweakSection label="Gold · Service Promise" />
              <TweakText label="Eyebrow" value={t.goldPromiseEyebrow}
                         onChange={(v) => setTweak('goldPromiseEyebrow', v)} />
              <TweakText label="Line 1" value={t.goldPromiseLine1}
                         onChange={(v) => setTweak('goldPromiseLine1', v)} />
              <TweakText label="Line 2 · gold" value={t.goldPromiseLine2}
                         onChange={(v) => setTweak('goldPromiseLine2', v)} />
            </>
          )}
          {routeKey === 'contact' && (
            <div style={{ fontSize: 11, lineHeight: 1.5, color: 'rgba(41,38,27,.7)' }}>
              Contact form is currently hard-coded. Add tweak fields in <code style={{ fontSize: 10 }}>OtherPages.jsx</code> ContactPage to expose them here.
            </div>
          )}
        </TweakTab>
        )}

        {/* ─────────────────────── SAVE ─────────────────────── */}
        <TweakTab id="save">
          <TweakSection label="Dev server" />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{
            display: 'inline-block', width: 8, height: 8, borderRadius: '50%',
            background: devStatus == null ? '#c9ad3b'
                      : devStatus.ok ? '#34c759' : '#c33a2a',
            boxShadow: '0 0 0 2px rgba(255,255,255,.6)',
            flexShrink: 0,
          }} />
          <div style={{ flex: 1, fontSize: 11, color: 'rgba(41,38,27,.85)' }}>
            {devStatus == null ? 'Checking…'
             : devStatus.ok ? 'Connected — drops save to assets/'
             : 'Offline — drops will preview but not persist'}
          </div>
          <button type="button" className="twk-btn secondary" style={{ height: 22, padding: '0 8px', fontSize: 10 }}
                  onClick={checkDevServer}>Recheck</button>
        </div>
        {devStatus && !devStatus.ok && (
          <div style={{ fontSize: 10.5, lineHeight: 1.5, color: 'rgba(41,38,27,.7)',
                        padding: '6px 8px', borderRadius: 6,
                        background: 'rgba(195,58,42,0.08)',
                        border: '1px solid rgba(195,58,42,0.25)' }}>
            Run <code style={{ fontSize: 10 }}>py dev-server.py</code> from the
            repo root, then click Recheck. {devStatus.reason && <span style={{ opacity: 0.7 }}>({devStatus.reason})</span>}
          </div>
        )}

        <TweakSection label="Save changes" />
        <TweakButton label="Save & lock to source" onClick={handleSave} />
        {saveResult && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 4 }}>
            {saveResult.pending ? (
              <div style={{ fontSize: 11, color: 'rgba(41,38,27,.7)' }}>Saving…</div>
            ) : saveResult.ok ? (
              <div style={{ fontSize: 11, lineHeight: 1.5, color: 'rgba(41,38,27,.78)' }}>
                <div style={{ fontWeight: 600 }}>✓ Locked to <code style={{ fontSize: 10 }}>{saveResult.filename}</code></div>
                {saveResult.uploads && saveResult.uploads.length > 0 && (
                  <div style={{ marginTop: 4, color: 'rgba(41,38,27,.7)' }}>
                    Promoted {saveResult.uploads.length} in-memory image{saveResult.uploads.length === 1 ? '' : 's'} into <code style={{ fontSize: 10 }}>assets/</code>:
                    <div style={{ fontFamily: 'ui-monospace,SFMono-Regular,Menlo,monospace', fontSize: 10, color: 'rgba(41,38,27,.62)', marginTop: 2 }}>
                      {saveResult.uploads.map((p) => <div key={p}>· {p}</div>)}
                    </div>
                  </div>
                )}
                {saveResult.failures && saveResult.failures.length > 0 && (
                  <div style={{ marginTop: 4, color: '#a13a2a' }}>
                    {saveResult.failures.length} image{saveResult.failures.length === 1 ? '' : 's'} couldn't be uploaded — they remain in memory only. Check dev server.
                  </div>
                )}
                <div style={{ marginTop: 4, color: 'rgba(41,38,27,.62)' }}>Refresh to see the locked-in defaults.</div>
              </div>
            ) : (
              <div style={{ fontSize: 11, color: '#a13a2a' }}>{saveResult.error}</div>
            )}
          </div>
        )}
        <TweakButton label="Copy JSON only" secondary onClick={handleExport} />
        {exportResult && exportResult.pending && (
          <div style={{ fontSize: 11, color: 'rgba(41,38,27,.7)' }}>Preparing…</div>
        )}
        {exportResult && !exportResult.pending && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 4 }}>
            {exportResult.uploads && exportResult.uploads.length > 0 && (
              <div style={{ fontSize: 11, lineHeight: 1.5, color: 'rgba(41,38,27,.78)' }}>
                <div style={{ fontWeight: 600, marginBottom: 4 }}>
                  Uploaded {exportResult.uploads.length} image{exportResult.uploads.length === 1 ? '' : 's'}:
                </div>
                <div style={{ fontFamily: 'ui-monospace,SFMono-Regular,Menlo,monospace', fontSize: 10, color: 'rgba(41,38,27,.62)' }}>
                  {exportResult.uploads.map((p) => <div key={p}>· {p}</div>)}
                </div>
              </div>
            )}
            <div style={{ fontSize: 10.5, lineHeight: 1.5, color: 'rgba(41,38,27,.7)' }}>
              JSON copied to clipboard. Paste between <code style={{ fontSize: 10 }}>/*EDITMODE-BEGIN*/</code> and <code style={{ fontSize: 10 }}>/*EDITMODE-END*/</code> in <code style={{ fontSize: 10 }}>index.html</code>, then refresh. <em>Tip: Save & lock above does this for you.</em>
            </div>
            <textarea readOnly value={exportResult.json}
              style={{ width: '100%', height: 110, fontFamily: 'ui-monospace,SFMono-Regular,Menlo,monospace',
                       fontSize: 10, lineHeight: 1.4, padding: 8, borderRadius: 7,
                       border: '.5px solid rgba(0,0,0,.1)', background: 'rgba(255,255,255,.6)',
                       color: 'inherit', outline: 'none', resize: 'vertical', boxSizing: 'border-box' }}
              onFocus={(e) => {
                e.target.select();
                if (navigator.clipboard?.writeText) navigator.clipboard.writeText(exportResult.json).catch(() => {});
              }} />
          </div>
        )}
        </TweakTab>

        </TweakTabs>
        </>
          );
        })()}
      </TweaksPanel>
    </div>
    </TweaksProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Auto-reload — editor only. Polls /__editor/version every 2s; when the
     max mtime under project/ changes, reloads the page. Skipped if not in
     editor mode (visitors), and gracefully no-ops if the dev server is
     down. The server intentionally excludes assets/ from the watch so a
     drop doesn't trigger reload mid-edit. -->
<script>
(function () {
  if (!window.__ampleEditor) return;
  let last = null;
  let consecutiveFails = 0;
  async function tick() {
    try {
      const r = await fetch('/__editor/version', { cache: 'no-store' });
      if (!r.ok) { consecutiveFails++; return; }
      consecutiveFails = 0;
      const { version } = await r.json();
      if (last == null) { last = version; return; }
      if (version !== last) {
        // Don't reload mid-upload or mid-save — Save & lock bumps the
        // index.html mtime and would race the in-flight PUT, dropping
        // the asset silently. Defer until activity drains; we'll catch
        // the change on the next poll once flags clear.
        if ((window.__ampleUploadsInFlight || 0) > 0 || window.__ampleSavePending) {
          return;
        }
        console.log('[ample] source changed → reload');
        location.reload();
      }
    } catch {
      consecutiveFails++;
    }
  }
  // 2s normal cadence. After 5 consecutive fails (server stopped) back
  // off to 10s so the console isn't noisy.
  setInterval(() => {
    if (consecutiveFails >= 5 && Date.now() % 10000 > 2000) return;
    tick();
  }, 2000);
})();
</script>
</body>
</html>
