name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run so we don't need a manual
          # toggle in repo settings.
          enablement: true

      - name: Upload project/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./project

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
